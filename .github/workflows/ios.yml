name: iOS Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test (iPhone Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun simctl list devicetypes | grep iPhone | tail -5

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Budget.xcodeproj \
            -scheme Budget

      - name: Build
        run: |
          xcodebuild build \
            -project Budget.xcodeproj \
            -scheme Budget \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project Budget.xcodeproj \
              -scheme Budget \
              -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
