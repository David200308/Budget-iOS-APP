name: Swift Package Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Validate project structure
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Verify project file is valid
        run: |
          xcodebuild -list -project Budget.xcodeproj

      - name: Check Swift syntax (debug build, no signing)
        run: |
          xcodebuild build \
            -project Budget.xcodeproj \
            -scheme Budget \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty || xcodebuild build \
              -project Budget.xcodeproj \
              -scheme Budget \
              -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              SWIFT_TREAT_WARNINGS_AS_ERRORS=NO
